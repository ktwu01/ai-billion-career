<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Billion Career</title>
  <script>
    // GitHub Pages SPA redirect: encode the path into a query param
    // so the main index.html can restore it via History API
    var segmentCount = 1; // number of path segments in the repo name
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
